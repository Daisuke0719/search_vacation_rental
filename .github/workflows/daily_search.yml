name: Daily Rental Search

on:
  schedule:
    # 月・水・金 02:00 JST = 日・火・木 17:00 UTC
    - cron: '0 17 * * 0,2,4'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: rental-search
  cancel-in-progress: false

env:
  WORK_DIR: 01_sapporo/05_rental_search
  PYTHON_VERSION: '3.12'

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ---- Setup ----
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '${{ env.WORK_DIR }}/requirements-ci.txt'

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install -r ${{ env.WORK_DIR }}/requirements-ci.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      # ---- Secrets ----
      - name: Create .env file
        run: |
          cat > ${{ env.WORK_DIR }}/.env << 'ENVEOF'
          LINE_CHANNEL_TOKEN=${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID=${{ secrets.LINE_USER_ID }}
          NOTION_API_KEY=${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }}
          ENVEOF

      # ---- Run Pipeline ----
      - name: Run scraping pipeline
        working-directory: ${{ env.WORK_DIR }}
        run: python ci_pipeline.py

      # ---- Artifacts ----
      - name: Upload Excel results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rental-search-results-${{ github.run_number }}
          path: ${{ env.WORK_DIR }}/output/rental_search_results_*.xlsx
          retention-days: 30

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: search-logs-${{ github.run_number }}
          path: ${{ env.WORK_DIR }}/logs/
          retention-days: 14

      # ---- Commit DB and caches ----
      - name: Commit updated DB and caches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.WORK_DIR }}/db/rental_search.db || true
          git add ${{ env.WORK_DIR }}/output/geocode_cache.json || true
          git add ${{ env.WORK_DIR }}/output/buildings.csv || true
          git diff --cached --quiet || git commit -m "chore: update DB and caches [ci skip]"
          git pull --rebase || true
          git push

      # ---- Deploy to GitHub Pages ----
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages content
        run: |
          mkdir -p _pages
          cp ${{ env.WORK_DIR }}/output/rental_map.html _pages/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ---- Sync to Notion ----
      - name: Sync to Notion
        if: env.NOTION_API_KEY != ''
        working-directory: ${{ env.WORK_DIR }}
        run: python notion_sync.py
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
